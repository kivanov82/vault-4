<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Vault 4">
  <defs>
    <!-- Outer glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner shadow on background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
  </defs>

  <!-- Background with subtle radial gradient -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Single thin border -->
  <rect x="20" y="20" width="472" height="472" rx="64" fill="none" stroke="#00ff41" stroke-opacity="0.35" stroke-width="3"/>

  <!-- V — clean chevron, no overlap with 4 -->
  <path
    d="M100,120 L170,120 L256,340 L342,120 L412,120 L280,430 L232,430 Z"
    fill="#00ff41"
    filter="url(#glow)"
  />

  <!-- 4 — small, crisp, bottom-right subscript -->
  <path
    d="M350,290 L350,370 L394,370 L394,290 L426,290 L426,398 L394,398 L394,430 L362,430 L362,398 L318,398 L318,370 L350,290 Z"
    fill="#00ff41"
    filter="url(#glow)"
  />
</svg>
