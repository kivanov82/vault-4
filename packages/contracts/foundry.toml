[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
hyperevm = "${HYPEREVM_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
